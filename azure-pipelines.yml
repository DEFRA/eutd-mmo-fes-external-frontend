name: $(BuildID).$(Date:yyyyMMdd).$(SourceBranchName)

parameters:
  - name: deployFromFeature
    displayName: "Deploy from Feature Branch"
    type: boolean
    default: false
  - name: deployToSecondaryRegion
    displayName: "Deploy to Secondary Region for DR"
    type: boolean
    default: false
  - name: skipPRE1
    displayName: "Skip PRE1 Deployment"
    type: boolean
    default: false
  - name: deployAppConfigOnly
    displayName: "Deploy App Settings Only"
    type: boolean
    default: false 
  - name: runPostDeploymentTests
    displayName: "Run Post-Deployment Tests"
    type: boolean
    default: false

trigger:
  branches:
    include:
      - "main"
      - "develop"
      - "hotfix/*"
      - "feature/*"
      - "epic/*"
  paths:
    exclude:
      - ".github/**"
pr:
  branches:
    include:
      - "main"
      - "develop"
  paths:
    exclude:
      - ".github/**"

resources:
  repositories:
    - repository: MMOPipelineCommon
      name: "DEFRA/eutd-mmo-fes-pipeline-common"
      endpoint: DEFRA
      type: github
      # ref: refs/heads/main
      ref: feature/post-depl-testing
    - repository: TestAutomation
      name: "DEFRA/eutd-mmo-fes-frontend-test-automation"
      type: github
      endpoint: DEFRA
      ref: refs/heads/main

extends:
  template: /includes/app-deployment.yaml@MMOPipelineCommon
  parameters:
    appName: "mmo-fes-external-fe"
    npmAuthenticate: false
    runCypressTests: true
    deployFromFeature: ${{ parameters.deployFromFeature }}
    deployToSecondaryRegion: ${{ parameters.deployToSecondaryRegion }}
    skipPRE1: ${{ parameters.skipPRE1 }}
    deployAppConfigOnly: ${{ parameters.deployAppConfigOnly }}
    runPostDeploymentTests: ${{ parameters.runPostDeploymentTests }}
